name: CI/CD

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: false

env:
  STAGE: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || (github.ref == 'refs/heads/main' && 'prod' || github.ref_name) }}
  INFISICAL_ENV: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}

jobs:
  lint-format:
    if: ${{ github.event_name != 'pull_request' || github.event.action != 'closed' }}
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format

  typecheck:
    if: ${{ github.event_name != 'pull_request' || github.event.action != 'closed' }}
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate marketing content collections
        run: bun run --cwd packages/marketing gen:content-collections

      - name: Typecheck
        run: bun run typecheck

  test:
    if: ${{ github.event_name != 'pull_request' || github.event.action != 'closed' }}
    name: Test
    runs-on: ubuntu-latest
    needs:
      - lint-format
      - typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: bun run test

  deploy:
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.head.repo.fork == false) }}
    name: Deploy
    runs-on: ubuntu-latest
    needs:
      - lint-format
      - typecheck
      - test
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Infisical CLI
        run: |
          curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' | sudo -E bash
          sudo apt-get update
          sudo apt-get install -y infisical

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Safety check
        run: |
          if [ "${{ env.STAGE }}" = "prod" ] && [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "ERROR: Cannot deploy prod from ${{ github.ref }}"
            exit 1
          fi

      - name: Deploy
        run: |
          infisical run --env="${{ env.INFISICAL_ENV }}" -- sh -c '
            test -n "${CLOUDFLARE_API_TOKEN:-}" || { echo "CLOUDFLARE_API_TOKEN missing from Infisical" >&2; exit 1; }
            test -n "${CLOUDFLARE_ACCOUNT_ID:-}" || { echo "CLOUDFLARE_ACCOUNT_ID missing from Infisical" >&2; exit 1; }
            bun alchemy deploy --stage "${STAGE}"
          '
        env:
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
          STAGE: ${{ env.STAGE }}
          PULL_REQUEST: ${{ github.event.number }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) }}
    name: Release
    runs-on: ubuntu-latest
    needs:
      - lint-format
      - typecheck
      - test
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REF_TYPE: ${{ github.ref_type }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          latest_tag() {
            git fetch --tags --force --quiet
            git tag -l 'v*' --sort=-v:refname | head -n 1
          }

          next_tag() {
            local latest="$1"
            local bump="$2"
            local major minor patch

            if [ -z "$latest" ]; then
              case "$bump" in
                major) echo "v1.0.0" ;;
                minor) echo "v0.1.0" ;;
                *) echo "v0.0.1" ;;
              esac
              return
            fi

            major="$(printf '%s' "$latest" | sed 's/^v//' | cut -d. -f1)"
            minor="$(printf '%s' "$latest" | sed 's/^v//' | cut -d. -f2)"
            patch="$(printf '%s' "$latest" | sed 's/^v//' | cut -d. -f3)"

            case "$bump" in
              major) echo "v$((major + 1)).0.0" ;;
              minor) echo "v${major}.$((minor + 1)).0" ;;
              *) echo "v${major}.${minor}.$((patch + 1))" ;;
            esac
          }

          determine_bump() {
            gh api graphql \
              -f owner='${{ github.repository_owner }}' \
              -f name='${{ github.event.repository.name }}' \
              -f oid="$GITHUB_SHA" \
              -f query='
                query AssociatedPullRequests($owner: String!, $name: String!, $oid: GitObjectID!) {
                  repository(owner: $owner, name: $name) {
                    object(oid: $oid) {
                      ... on Commit {
                        associatedPullRequests(first: 1) {
                          nodes {
                            labels(first: 50) { nodes { name } }
                          }
                        }
                      }
                    }
                  }
                }
              ' --jq '
                .data.repository.object.associatedPullRequests.nodes[0].labels.nodes // []
                | map(.name)
                | if index("release:major") then "major"
                  elif index("release:minor") then "minor"
                  else "patch" end
              '
          }

          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            TAG="$GITHUB_REF_NAME"
            echo "Using pushed tag: $TAG"
          else
            BUMP="$(determine_bump)"
            LATEST="$(latest_tag)"
            TAG="$(next_tag "$LATEST" "$BUMP")"

            echo "Version bump: $BUMP"
            echo "Latest tag: ${LATEST:-none}"
            echo "Next tag: $TAG"

            if git rev-parse "$TAG" >/dev/null 2>&1; then
              echo "Tag $TAG already exists locally."
            else
              git tag "$TAG"
            fi

            git push origin "$TAG"
          fi

          gh release create "$TAG" --generate-notes --verify-tag || {
            if gh release view "$TAG" >/dev/null 2>&1; then
              echo "GitHub release for $TAG already exists; nothing to do."
            else
              exit 1
            fi
          }

  cleanup:
    if: ${{ github.event_name == 'pull_request' && github.event.action == 'closed' }}
    name: Cleanup preview
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Infisical CLI
        run: |
          curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' | sudo -E bash
          sudo apt-get update
          sudo apt-get install -y infisical

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Safety check
        run: |
          if [ "${{ env.STAGE }}" = "prod" ]; then
            echo "ERROR: Cannot destroy prod environment in cleanup job"
            exit 1
          fi

      - name: Destroy preview environment
        run: |
          infisical run --env="${{ env.INFISICAL_ENV }}" -- sh -c '
            test -n "${CLOUDFLARE_API_TOKEN:-}" || { echo "CLOUDFLARE_API_TOKEN missing from Infisical" >&2; exit 1; }
            test -n "${CLOUDFLARE_ACCOUNT_ID:-}" || { echo "CLOUDFLARE_ACCOUNT_ID missing from Infisical" >&2; exit 1; }
            bun alchemy destroy --stage "${STAGE}"
          '
        env:
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
          STAGE: ${{ env.STAGE }}
          PULL_REQUEST: ${{ github.event.number }}
